<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>handy</title>
    <style>
      :root {
        color-scheme: dark;
        background: #0a0f19;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        margin: 0;
        background: #0a0f19;
      }

      body {
        overflow: hidden;
      }

      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            1200px 520px at 90% -10%,
            rgba(59, 130, 246, 0.13),
            transparent 55%
          ),
          radial-gradient(
            900px 420px at -10% 100%,
            rgba(34, 197, 94, 0.09),
            transparent 60%
          ),
          #0a0f19;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
