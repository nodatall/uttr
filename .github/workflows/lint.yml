name: "lint"
on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check translation consistency
        run: bun run check:translations

      - name: Run ESLint
        run: bun run lint

      - name: Install marketing site dependencies
        working-directory: marketing-site
        run: npm ci

      - name: Run marketing site ESLint
        run: npm --prefix marketing-site run lint

      - name: Build marketing site
        run: npm --prefix marketing-site run build
