<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full System Progress Overlay Mock</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg-top: #0a1018;
        --bg-bottom: #0d131d;
        --panel-border: rgb(255 255 255 / 7%);
        --panel-shadow: 0 18px 40px rgb(0 0 0 / 28%);
        --text-strong: rgb(247 251 255 / 95%);
        --text-muted: rgb(167 179 194 / 72%);
        --text-soft: rgb(173 186 199 / 78%);
        --accent-a: #1ea672;
        --accent-b: #2cc18c;
        --accent-c: #6fe0b4;
        --track: rgb(255 255 255 / 6%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgb(44 193 140 / 9%), transparent 32%),
          radial-gradient(circle at bottom right, rgb(54 92 138 / 7%), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text-strong);
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      }

      .stage {
        width: min(920px, calc(100vw - 32px));
        display: grid;
        gap: 22px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .control {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgb(255 255 255 / 8%);
        color: var(--text-strong);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .control:hover {
        transform: translateY(-1px);
        background: rgb(255 255 255 / 12%);
      }

      .control.is-active {
        background: linear-gradient(90deg, rgb(30 166 114 / 96%), rgb(44 193 140 / 94%));
        color: rgb(5 18 14 / 94%);
        box-shadow: 0 10px 22px rgb(30 166 114 / 24%);
      }

      .preview-shell {
        min-height: 392px;
        border-radius: 30px;
        border: 1px solid rgb(255 255 255 / 5%);
        background:
          linear-gradient(180deg, rgb(255 255 255 / 2%), rgb(255 255 255 / 1%)),
          rgb(8 12 19 / 72%);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 2%);
        display: grid;
        place-items: center;
        padding: 36px;
        overflow: hidden;
        position: relative;
      }

      .preview-shell::before,
      .preview-shell::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(36px);
        opacity: 0.55;
        pointer-events: none;
      }

      .preview-shell::before {
        width: 240px;
        height: 240px;
        background: rgb(41 168 121 / 12%);
        top: -90px;
        left: -40px;
      }

      .preview-shell::after {
        width: 180px;
        height: 180px;
        background: rgb(79 122 170 / 8%);
        right: -40px;
        bottom: -40px;
      }

      .overlay-card {
        width: min(520px, 100%);
        height: 272px;
        padding: 16px 18px 18px;
        border-radius: 7px;
        border: 1px solid var(--panel-border);
        background:
          radial-gradient(circle at 16% 10%, rgb(46 182 128 / 8%), transparent 24%),
          radial-gradient(circle at 82% 80%, rgb(82 104 142 / 6%), transparent 22%),
          linear-gradient(145deg, rgb(16 22 31 / 96%), rgb(15 21 30 / 92%));
        backdrop-filter: blur(16px) saturate(132%);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 7%),
          var(--panel-shadow);
        display: grid;
        gap: 16px;
        position: relative;
        overflow: hidden;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgb(122 133 146 / 78%);
      }

      .headline {
        display: grid;
        gap: 10px;
        min-height: 88px;
      }

      .headline-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .headline h1 {
        margin: 0;
        font-size: clamp(22px, 4vw, 30px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .headline-title {
        min-width: 0;
        flex: 1;
      }

      .headline p {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .meter {
        display: grid;
        gap: 10px;
      }

      .meter-topline {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      .meter-label {
        font-size: 14px;
        font-weight: 600;
      }

      .meter-value {
        font-size: 13px;
        color: rgb(198 214 225 / 84%);
      }

      .progress-track {
        height: 12px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 7%), rgb(255 255 255 / 3%)),
          var(--track);
        padding: 2px;
        overflow: hidden;
        position: relative;
      }

      .progress-track::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgb(255 255 255 / 4%), transparent);
        transform: translateX(-100%);
        animation: sheen 2.6s linear infinite;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent-a), var(--accent-b), var(--accent-c));
        box-shadow:
          0 0 14px rgb(44 193 140 / 22%),
          inset 0 1px 0 rgb(255 255 255 / 26%);
        transition: width 420ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .footer-note {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-soft);
        font-size: 12px;
      }

      .pulse {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-a);
        box-shadow: 0 0 16px rgb(44 193 140 / 35%);
        animation: pulse 1.5s ease-in-out infinite;
      }

      .actions {
        display: none;
        gap: 8px;
        flex-shrink: 0;
      }

      .actions.is-visible {
        display: flex;
      }

      .action {
        border: 0;
        border-radius: 7px;
        padding: 9px 13px;
        background: rgb(255 255 255 / 8%);
        color: var(--text-strong);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .action:hover {
        transform: translateY(-1px);
        background: rgb(255 255 255 / 12%);
      }

      .action-primary {
        background: linear-gradient(90deg, rgb(30 166 114 / 96%), rgb(44 193 140 / 94%));
        color: rgb(5 18 14 / 94%);
        box-shadow: 0 10px 22px rgb(30 166 114 / 24%);
      }

      .action-primary:hover {
        background: linear-gradient(90deg, rgb(42 178 126 / 98%), rgb(64 205 152 / 96%));
      }

      .action-ghost {
        background: rgb(255 255 255 / 5%);
        color: rgb(205 214 224 / 82%);
      }

      .action-ghost:hover {
        background: rgb(255 255 255 / 9%);
        color: rgb(240 245 250 / 92%);
      }

      .notes {
        color: rgb(173 186 199 / 74%);
        font-size: 13px;
        line-height: 1.45;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.82;
        }

        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      @keyframes sheen {
        to {
          transform: translateX(100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="controls">
        <button class="control" data-stage="preparing">Preparing</button>
        <button class="control" data-stage="transcribing">Transcribing</button>
        <button class="control" data-stage="processing">Post-processing</button>
        <button class="control" data-stage="complete">Complete</button>
      </div>

      <div class="preview-shell">
        <div class="overlay-card">
          <div class="status-row">
            <div class="eyebrow">FULL SYSTEM</div>
          </div>

          <div class="headline">
            <div class="headline-top">
              <div class="headline-title">
                <h1 id="title">Preparing capture</h1>
              </div>
              <div class="actions" id="actions">
                <button class="action action-primary">Copy</button>
                <button class="action">View</button>
                <button class="action action-ghost">Exit</button>
              </div>
            </div>
            <p id="subtitle">Getting the system and microphone audio ready.</p>
          </div>

          <div class="meter">
            <div class="meter-topline">
              <div class="meter-label" id="label">Preparing audio</div>
              <div class="meter-value" id="meter-percent">18%</div>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="fill"></div>
            </div>
          </div>

          <div class="footer-note">
            <span class="pulse"></span>
            <span id="footer">Large recordings can take a little longer.</span>
          </div>
        </div>
      </div>

      <div class="notes">
        This standalone mock mirrors the current bottom overlay direction. Use the stage buttons above
        to flip between progress states and the completed action row.
      </div>
    </div>

    <script>
      const stages = {
        preparing: {
          percent: 18,
          title: "Preparing capture",
          subtitle: "Getting the system and microphone audio ready.",
          label: "Preparing audio",
          footer: "Large recordings can take a little longer.",
          complete: false,
        },
        transcribing: {
          percent: 66,
          title: "Transcribing system audio",
          subtitle: "Working through the captured audio now.",
          label: "Transcribing",
          footer: "Uttr will save the finished transcript to History.",
          complete: false,
        },
        processing: {
          percent: 88,
          title: "Polishing transcript",
          subtitle: "Applying post-processing before saving.",
          label: "Post-processing",
          footer: "Cleaning up punctuation and formatting.",
          complete: false,
        },
        complete: {
          percent: 100,
          title: "Transcript ready",
          subtitle: "Saved to History. Copy it now or open the full entry.",
          label: "Complete",
          footer: "Ready for review.",
          complete: true,
        },
      };

      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const label = document.getElementById("label");
      const footer = document.getElementById("footer");
      const fill = document.getElementById("fill");
      const meterPercent = document.getElementById("meter-percent");
      const actions = document.getElementById("actions");
      const buttons = [...document.querySelectorAll("[data-stage]")];

      function setStage(stageKey) {
        const stage = stages[stageKey];
        title.textContent = stage.title;
        subtitle.textContent = stage.subtitle;
        label.textContent = stage.label;
        footer.textContent = stage.footer;
        meterPercent.textContent = `${stage.percent}%`;
        fill.style.width = `${stage.percent}%`;
        actions.classList.toggle("is-visible", stage.complete);

        buttons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.stage === stageKey);
        });
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => setStage(button.dataset.stage));
      });

      setStage("complete");
    </script>
  </body>
</html>
