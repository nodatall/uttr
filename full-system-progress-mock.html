<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Full System Progress Mock</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg-top: #0a1018;
        --bg-bottom: #0d131d;
        --panel-bg: linear-gradient(
          145deg,
          rgb(16 22 31 / 96%),
          rgb(15 21 30 / 92%)
        );
        --panel-border: rgb(255 255 255 / 07%);
        --panel-shadow: 0 18px 40px rgb(0 0 0 / 28%);
        --text-strong: rgb(247 251 255 / 95%);
        --text-muted: rgb(167 179 194 / 72%);
        --accent-a: #1ea672;
        --accent-b: #2cc18c;
        --accent-c: #6fe0b4;
        --bar-track: rgb(255 255 255 / 06%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgb(44 193 140 / 09%), transparent 32%),
          radial-gradient(circle at bottom right, rgb(54 92 138 / 07%), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        color: var(--text-strong);
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      }

      .stage {
        width: min(920px, calc(100vw - 32px));
        display: grid;
        gap: 24px;
      }

      .preview-shell {
        min-height: 300px;
        border-radius: 30px;
        border: 1px solid rgb(255 255 255 / 05%);
        background:
          linear-gradient(180deg, rgb(255 255 255 / 02%), rgb(255 255 255 / 01%)),
          rgb(8 12 19 / 72%);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 02%);
        display: grid;
        place-items: center;
        padding: 36px;
        overflow: hidden;
        position: relative;
      }

      .preview-shell::before,
      .preview-shell::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        filter: blur(36px);
        opacity: 0.55;
        pointer-events: none;
      }

      .preview-shell::before {
        width: 240px;
        height: 240px;
        background: rgb(41 168 121 / 12%);
        top: -90px;
        left: -40px;
      }

      .preview-shell::after {
        width: 180px;
        height: 180px;
        background: rgb(79 122 170 / 08%);
        right: -40px;
        bottom: -40px;
      }

      .overlay-card {
        width: min(520px, 100%);
        height: 196px;
        padding: 16px 18px 18px;
        border-radius: 7px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg);
        backdrop-filter: blur(16px) saturate(132%);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 07%),
          var(--panel-shadow);
        display: grid;
        gap: 16px;
        position: relative;
        overflow: hidden;
      }

      .overlay-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 16% 10%, rgb(46 182 128 / 08%), transparent 24%),
          radial-gradient(circle at 82% 80%, rgb(82 104 142 / 06%), transparent 22%);
        pointer-events: none;
      }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgb(122 133 146 / 78%);
      }

      .clock {
        font-size: 12px;
        color: rgb(149 160 173 / 64%);
      }

      .headline {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 6px;
        min-height: 72px;
      }

      .headline h1 {
        margin: 0;
        font-size: clamp(22px, 4vw, 30px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .headline p {
        margin: 0;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .meter {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 10px;
      }

      .meter-topline {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      .meter-label {
        font-size: 14px;
        font-weight: 600;
      }

      .meter-value {
        font-size: 13px;
        color: rgb(198 214 225 / 84%);
      }

      .progress-track {
        height: 12px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgb(255 255 255 / 07%), rgb(255 255 255 / 03%)),
          var(--bar-track);
        padding: 2px;
        overflow: hidden;
        position: relative;
      }

      .progress-track::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgb(255 255 255 / 04%), transparent);
        transform: translateX(-100%);
        animation: sheen 2.6s linear infinite;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background:
          linear-gradient(90deg, var(--accent-a), var(--accent-b), var(--accent-c));
        box-shadow:
          0 0 14px rgb(44 193 140 / 22%),
          inset 0 1px 0 rgb(255 255 255 / 26%);
        transition: width 480ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .mini-pulse {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-a);
        box-shadow: 0 0 16px rgb(44 193 140 / 35%);
        animation: pulse 1.5s ease-in-out infinite;
      }

      .footer-note {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgb(173 186 199 / 78%);
        font-size: 12px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        background: rgb(255 255 255 / 08%);
        color: var(--text-strong);
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 120ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      button:hover {
        background: rgb(255 255 255 / 12%);
        box-shadow: 0 10px 25px rgb(0 0 0 / 16%);
        transform: translateY(-1px);
      }

      button.primary {
        background: linear-gradient(90deg, rgb(24 131 91), rgb(34 162 114));
        color: white;
      }

      @keyframes sheen {
        to {
          transform: translateX(100%);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(0.82);
          opacity: 0.7;
        }

        50% {
          transform: scale(1.15);
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        .preview-shell {
          min-height: 250px;
          padding: 20px;
        }

        .overlay-card {
          height: 196px;
          padding: 14px;
          border-radius: 7px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="preview-shell">
        <div class="overlay-card">
          <div class="status-row">
            <div class="eyebrow" id="eyebrow">Full system audio</div>
            <div class="clock" id="clock">Long recording detected</div>
          </div>

          <div class="headline">
            <h1 id="title">Transcribing recording</h1>
            <p id="description">
              Breaking the captured audio into chunks before stitching the final
              transcript.
            </p>
          </div>

          <div class="meter">
            <div class="meter-topline">
              <div class="meter-label" id="phaseLabel">Chunk 2 of 6</div>
              <div class="meter-value" id="percent">34%</div>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </div>

          <div class="footer-note">
            <div class="mini-pulse"></div>
            <div id="footerText">Estimated time remaining: about 6 seconds</div>
          </div>
        </div>
      </section>

      <section class="controls">
        <button class="primary" data-scene="loop">Play Loop</button>
        <button data-scene="transcribe">Chunked Transcribing</button>
        <button data-scene="stitch">Stitching</button>
        <button data-scene="process">Post-processing</button>
        <button data-scene="done">Done</button>
      </section>
    </main>

    <script>
      const scenes = {
        transcribe: {
          eyebrow: "Full system audio",
          clock: "Long recording detected",
          title: "Transcribing recording",
          description:
            "Breaking the captured audio into chunks before stitching the final transcript.",
          phaseLabel: "Chunk 2 of 6",
          percent: 34,
          footer: "Estimated time remaining: about 6 seconds",
          chips: [
            { label: "Capture finished", state: "complete" },
            { label: "Chunked transcription", state: "active" },
            { label: "Stitching", state: "" },
            { label: "Post-processing", state: "" },
          ],
        },
        stitch: {
          eyebrow: "Full system audio",
          clock: "Almost there",
          title: "Stitching transcript",
          description:
            "Combining chunk output into one clean transcript before final polish.",
          phaseLabel: "Merging chunk boundaries",
          percent: 78,
          footer: "Final assembly in progress",
          chips: [
            { label: "Capture finished", state: "complete" },
            { label: "Chunked transcription", state: "complete" },
            { label: "Stitching", state: "active" },
            { label: "Post-processing", state: "" },
          ],
        },
        process: {
          eyebrow: "Full system audio",
          clock: "Optional polish",
          title: "Post-processing transcript",
          description:
            "Cleaning up the stitched result and preparing the final text for paste.",
          phaseLabel: "Applying cleanup prompt",
          percent: 92,
          footer: "Just a moment",
          chips: [
            { label: "Capture finished", state: "complete" },
            { label: "Chunked transcription", state: "complete" },
            { label: "Stitching", state: "complete" },
            { label: "Post-processing", state: "active" },
          ],
        },
        done: {
          eyebrow: "Full system audio",
          clock: "Complete",
          title: "Transcript ready",
          description:
            "The final text is prepared and ready to paste back into your app.",
          phaseLabel: "Finished",
          percent: 100,
          footer: "Overlay dismisses after handoff",
          chips: [
            { label: "Capture finished", state: "complete" },
            { label: "Chunked transcription", state: "complete" },
            { label: "Stitching", state: "complete" },
            { label: "Post-processing", state: "complete" },
          ],
        },
      };

      const titleEl = document.getElementById("title");
      const descriptionEl = document.getElementById("description");
      const eyebrowEl = document.getElementById("eyebrow");
      const clockEl = document.getElementById("clock");
      const phaseLabelEl = document.getElementById("phaseLabel");
      const percentEl = document.getElementById("percent");
      const footerEl = document.getElementById("footerText");
      const progressFillEl = document.getElementById("progressFill");
      const buttons = Array.from(document.querySelectorAll("button[data-scene]"));

      let loopTimer = null;

      function applyScene(name) {
        const scene = scenes[name];
        if (!scene) return;
        eyebrowEl.textContent = scene.eyebrow;
        clockEl.textContent = scene.clock;
        titleEl.textContent = scene.title;
        descriptionEl.textContent = scene.description;
        phaseLabelEl.textContent = scene.phaseLabel;
        percentEl.textContent = `${scene.percent}%`;
        footerEl.textContent = scene.footer;
        progressFillEl.style.width = `${scene.percent}%`;
      }

      function stopLoop() {
        if (loopTimer) {
          clearInterval(loopTimer);
          loopTimer = null;
        }
      }

      function startLoop() {
        stopLoop();
        const order = ["transcribe", "stitch", "process", "done"];
        let index = 0;
        applyScene(order[index]);
        loopTimer = setInterval(() => {
          index = (index + 1) % order.length;
          applyScene(order[index]);
        }, 1800);
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const scene = button.dataset.scene;
          if (scene === "loop") {
            startLoop();
            return;
          }
          stopLoop();
          applyScene(scene);
        });
      });

      applyScene("transcribe");
    </script>
  </body>
</html>
